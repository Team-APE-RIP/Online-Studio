services:
  web:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: ${PROJECT_ROOT}/infra/docker/web.Dockerfile
    container_name: team-ape-rip-web
    restart: unless-stopped
    env_file:
      - ${PROJECT_ROOT}/.env
    ports:
      - "${WEB_PORT:-14010}:14010"
    volumes:
      - ${PROJECT_ROOT}/runtime/logs/web:/app/runtime/logs/web
      - ${PROJECT_ROOT}/runtime/compose/web:/app/runtime/compose/web
    depends_on:
      - server
    networks:
      - team-ape-rip-network

  server:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: ${PROJECT_ROOT}/infra/docker/server.Dockerfile
    container_name: team-ape-rip-server
    restart: unless-stopped
    env_file:
      - ${PROJECT_ROOT}/.env
    ports:
      - "${SERVER_PORT:-14011}:${SERVER_PORT:-14011}"
    volumes:
      - ${PROJECT_ROOT}/runtime/logs/server:/app/runtime/logs/server
      - ${PROJECT_ROOT}/runtime/uploads:/app/runtime/uploads
      - ${PROJECT_ROOT}/runtime/temp:/app/runtime/temp
      - ${PROJECT_ROOT}/runtime/cache:/app/runtime/cache
      - ${PROJECT_ROOT}/runtime/compose/server:/app/runtime/compose/server
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - team-ape-rip-network

networks:
  team-ape-rip-network:
    driver: bridge